# Render Blueprint — deploys the backend API + static frontend (no Docker).
# See DEPLOY.md for the full walkthrough (GitHub App prod callback, secrets, etc.).
#
# Defaults to the FREE tier: the backend spins down when idle and its filesystem
# is ephemeral, so SQLite data resets on each deploy. To make data persist,
# switch the API service to `plan: starter` and add a disk (see DEPLOY.md).

services:
  # ── Backend API (Node/Fastify) ──
  - type: web
    name: git-secure-ai-api
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm ci --include=dev && npm run setup:scanners && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: FRONTEND_URL
        fromService:
          type: web
          name: git-secure-ai-web
          property: host
      - key: SESSION_SECRET
        generateValue: true
      # Secrets — set these in the Render dashboard (never commit them).
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false

  # ── Frontend (static Vite build) ──
  - type: web
    name: git-secure-ai-web
    runtime: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: git-secure-ai-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
