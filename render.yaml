# Render Blueprint — one-click-ish deploy of the backend API + static frontend.
# See DEPLOY.md for the full walkthrough (GitHub App prod callback, secrets, etc.).
#
# Note: the backend uses SQLite on a persistent disk, which requires a paid
# instance type (free web services have an ephemeral filesystem — data resets on
# every deploy). Swap to a managed Postgres later for scale.

services:
  # ── Backend API (Node/Fastify) ──
  - type: web
    name: git-secure-ai-api
    runtime: node
    rootDir: Backend
    plan: starter # required for a persistent disk (free tier has no disk)
    buildCommand: npm ci --include=dev && npm run setup:scanners && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    disk:
      name: sai-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/prod.db
      - key: FRONTEND_URL
        fromService:
          type: web
          name: git-secure-ai-web
          property: host
      - key: SESSION_SECRET
        generateValue: true
      # Secrets — set these in the Render dashboard (never commit them).
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false

  # ── Frontend (static Vite build) ──
  - type: web
    name: git-secure-ai-web
    runtime: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: git-secure-ai-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
